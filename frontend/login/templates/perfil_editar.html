{% extends 'base.html' %}
{% block title %}Editar perfil — LAAC LAB{% endblock %}

{% block content %}
<div class="panel-wrap">
    <div class="panel panel-wide">
        <div class="panel-header">
            <span class="eyebrow">EDIÇÃO</span>
            <h1>Editar perfil</h1>
            <p class="subtitle">Atualize seus dados. Deixe a senha em branco para mantê-la.</p>
        </div>

        <form method="POST" class="form" novalidate>
            <div class="field">
                <label for="nome_usuario">Nome de usuário</label>
                <input type="text" id="nome_usuario" name="nome_usuario" required minlength="3"
                       value="{{ usuario.nome_usuario or '' }}">
            </div>

            <div class="field">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required
                       value="{{ usuario.email or '' }}">
            </div>

            <div class="field-row">
                <div class="field">
                    <label for="idade">Idade</label>
                    <input type="number" id="idade" name="idade" min="0" max="150"
                           value="{{ usuario.idade or '' }}">
                </div>
                <div class="field">
                    <label for="avatar_url">URL do avatar</label>
                    <input type="url" id="avatar_url" name="avatar_url"
                           placeholder="https://..." value="{{ usuario.avatar_url or '' }}">
                </div>
            </div>

            <div class="field">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" class="field-textarea"
                          placeholder="Fale um pouco sobre você...">{{ usuario.bio or '' }}</textarea>
            </div>

            <div class="field">
                <label for="senha">Nova senha</label>
                <div class="input-with-action">
                    <input type="password" id="senha" name="senha" minlength="6"
                           placeholder="deixe em branco para não alterar" autocomplete="new-password">
                    <button type="button" class="toggle-pass" data-target="senha" aria-label="Mostrar senha">👁</button>
                </div>
            </div>

            <button type="submit" class="btn-primary">
                <span>Salvar alterações</span>
                <span class="btn-arrow">›</span>
            </button>
        </form>

        <p class="panel-foot">
            <a href="{{ url_for('perfil') }}">‹ Voltar ao perfil</a>
        </p>
    </div>
</div>
{% endblock %}
